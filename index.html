<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat da Sala</title>
    <style>
        :root {
            --bg-main: #000000;          /* Fundo geral (Preto) */
            --bg-container: #0b141a;     /* Fundo do chat estilo WhatsApp escuro */
            --blue-dark: #075e54;        /* Azul Escuro (Balão enviado / Destaques) */
            --blue-light: #86c5da;       /* Azul Claro (Textos principais / Nomes) */
            --text-msg: #e9edef;         /* Cor do texto dentro dos balões */
            --text-sub: #667781;         /* Cor secundária (Horários) */
            --border: #222e35;           /* Linhas divisórias */
            --msg-in: #1f2c34;           /* Balão recebido (Cinza azulado escuro) */
            --msg-out: #0a4d68;          /* Balão enviado (Azul Escuro Adaptado) */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        /* Otimização para Tela Cheia no Celular e PC */
        body, html { 
            background: var(--bg-main); 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        
        .container { 
            background: var(--bg-container); 
            width: 100%; 
            height: 100%; 
            max-width: 500px; /* Limita a largura no PC para parecer um celular */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        @media (min-width: 501px) {
            .container {
                height: 92vh;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            }
        }
        
        .hidden { display: none !important; }
        
        /* --- TELA DE LOGIN --- */
        #auth-container { 
            padding: 30px; 
            justify-content: center; 
            align-items: center; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            background: var(--bg-container);
        }
        #auth-container h2 { 
            margin-bottom: 25px; 
            font-weight: 600; 
            font-size: 24px; 
            color: var(--blue-light); 
        }
        
        /* --- TELA DO CHAT --- */
        #chat-container { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }
        
        .chat-header { 
            background: #111b21; 
            padding: 12px 16px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 60px;
        }
        .chat-header h3 { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--blue-light);
            max-width: 70%; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
        
        /* Área das Mensagens (Estilo WhatsApp) */
        #messages { 
            flex: 1; 
            padding: 16px; 
            overflow-y: auto; 
            background-color: var(--bg-main); /* Fundo Preto solicitado */
            background-image: radial-gradient(var(--border) 1px, transparent 0); 
            background-size: 20px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        
        /* Balões de Mensagem Avançados */
        .msg-wrapper { 
            display: flex; 
            flex-direction: column; 
            max-width: 85%; 
            width: fit-content; 
            animation: fadeIn 0.15s ease-out; 
            position: relative;
        }
        .msg-wrapper.out { align-self: flex-end; }
        .msg-wrapper.in { align-self: flex-start; }
        
        .msg-author { 
            font-size: 12px; 
            color: var(--blue-light); /* Nome em Azul Claro */
            font-weight: 600;
            margin-left: 4px; 
            margin-bottom: 2px; 
        }
        .out .msg-author { display: none; } 

        .msg-box { 
            padding: 8px 12px 18px 12px; 
            border-radius: 12px; 
            font-size: 15px; 
            line-height: 1.4; 
            word-break: break-word; 
            box-shadow: 0 1px 1px rgba(0,0,0,0.2); 
            position: relative;
            color: var(--text-msg);
        }
        .in .msg-box { 
            background: var(--msg-in); 
            border-top-left-radius: 0; 
        }
        .out .msg-box { 
            background: var(--msg-out); /* Azul Escuro */
            border-top-right-radius: 0; 
        }

        /* Data e Hora dentro do balão */
        .msg-time {
            position: absolute;
            bottom: 3px;
            right: 8px;
            font-size: 10px;
            color: var(--blue-light);
            opacity: 0.8;
        }
        
        /* Inputs e Botões Estilizados */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background: #202c33; 
            color: var(--text-msg); 
            font-size: 16px; 
            outline: none; 
        }
        input:focus { border-color: var(--blue-light); }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--msg-out); 
            color: var(--blue-light); 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            transition: opacity 0.2s; 
        }
        button:hover { opacity: 0.9; }
        
        /* Rodapé de digitação estilo WhatsApp */
        .chat-input-area { 
            padding: 10px; 
            background: #111b21; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            height: 60px;
        }
        .chat-input-area input { 
            margin: 0; 
            flex: 1; 
            border-radius: 24px; 
            padding: 10px 16px;
            border: none;
        }
        .chat-input-area button { 
            width: auto; 
            padding: 10px 18px; 
            border-radius: 24px; 
            background: var(--blue-dark);
            color: white;
        }
        
        .btn-logout { 
            background: transparent; 
            color: #ef5350; 
            padding: 6px 12px; 
            font-size: 13px; 
            font-weight: normal; 
            width: auto; 
            border: 1px solid #ef5350; 
            border-radius: 20px; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-container">
            <h2>Entrar no Chat</h2>
            <input type="text" id="student-name" placeholder="Digite seu nome...">
            <button onclick="login()">Entrar no Chat</button>
        </div>

        <div id="chat-container" class="hidden">
            <div class="chat-header">
                <h3>Olá, <span id="user-display"></span>!</h3>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
            
            <div id="messages">Carregando mensagens...</div>
            
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Digite sua mensagem aqui..." onkeydown="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // =================================================================
        // Link de conexão com o seu Google Apps Script
        // =================================================================
        const URL_DO_SCRIPT = "https://script.google.com/macros/s/AKfycbxcB6DJdBFsfKhLTadjzynv2flHjComA0Yp5GwuFmW2UgcyItSIcMGlmSIC00A3cCiLTA/exec";
        
        let usuarioLogado = "";
        let temporizadorChat = null;

        // Listener para permitir entrar apertando Enter na tela de login
        document.getElementById('student-name').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') login();
        });

        function login() {
            const nomeInput = document.getElementById('student-name').value.trim();
            if(nomeInput) {
                usuarioLogado = nomeInput;
                
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('chat-container').classList.remove('hidden');
                document.getElementById('user-display').innerText = nomeInput;
                
                const msgInput = document.getElementById('msg-input');
                msgInput.focus();
                
                atualizarChat();
                temporizadorChat = setInterval(atualizarChat, 3000);
            } else {
                alert("Por favor, digite o seu nome para entrar.");
            }
        }

        // Formata a data/hora para o padrão do balão (HH:MM)
        function formatarHora(stringData) {
            try {
                const data = new Date(stringData);
                if (isNaN(data.getTime())) {
                    const agora = new Date();
                    return agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                }
                return data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return "";
            }
        }

        async function atualizarChat() {
            const msgArea = document.getElementById('messages');
            if (URL_DO_SCRIPT === "COLE_AQUI_A_SUA_URL_DO_WEB_APP") {
                msgArea.innerHTML = "<p style='color:red; text-align:center;'>Erro: Insira a URL do Script!</p>";
                return;
            }

            try {
                const response = await fetch(URL_DO_SCRIPT);
                const dados = await response.json();
                
                msgArea.innerHTML = ''; 
                
                if(dados.length === 0) {
                    msgArea.innerHTML = '<p style="color:var(--text-sub); text-align:center; font-size:14px; margin-top:20px;">Nenhuma mensagem por enquanto...</p>';
                }

                dados.forEach(item => {
                    const eMinha = item.nome === usuarioLogado;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = `msg-wrapper ${eMinha ? 'out' : 'in'}`;
                    
                    const author = document.createElement('div');
                    author.className = 'msg-author';
                    author.innerText = item.nome;
                    
                    const box = document.createElement('div');
                    box.className = 'msg-box';
                    box.innerText = item.mensagem;
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'msg-time';
                    timeSpan.innerText = formatarHora(item.data);
                    
                    box.appendChild(timeSpan);
                    wrapper.appendChild(author);
                    wrapper.appendChild(box);
                    msgArea.appendChild(wrapper);
                });
                
                msgArea.scrollTop = msgArea.scrollHeight; 
            } catch (erro) {
                console.error("Erro ao buscar dados:", erro);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            
            if(!texto) return;
            input.value = '';

            const dadosEnvio = {
                nome: usuarioLogado,
                mensagem: texto,
                data: new Date().toISOString()
            };

            try {
                await fetch(URL_DO_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosEnvio)
                });
                
                atualizarChat();
            } catch (erro) {
                console.error("Erro ao enviar:", erro);
            }
        }

        function logout() {
            if(temporizadorChat) clearInterval(temporizadorChat);
            location.reload();
        }
    </script>
</body>
</html>
